<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro – Basic Combination</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; text-align: center; }

  /* Top row: left consonants | syllable box | right consonants */
  .top-row {
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 700px;
  }

  .consonant-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .panel-title { font-size: 0.8rem; font-weight: 700; color: #555; margin-bottom: 2px; text-align: center; }
  .panel-sub   { font-size: 0.68rem; color: #999; text-align: center; margin-bottom: 4px; }

  .cards-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Bottom row: vowels */
  .vowel-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    width: 100%;
    max-width: 700px;
  }

  .vowel-grid {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
  }

  .card {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: grab;
    user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    border: 3px solid transparent;
  }
  .card:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .card.consonant { background: #f08080; color: #fff; border-color: #e06060; }
  .card.vowel     { background: #7eb8e8; color: #fff; border-color: #5a9fd4; }
  .card.dragging  { opacity: 0.4; }

  /* Drop zone */
  .drop-panel {
    background: #e8f5e9;
    border: 2px dashed #81c784;
    border-radius: 16px;
    padding: 16px 14px;
    min-width: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .drop-panel.dragover { background: #c8e6c9; border-color: #388e3c; }

  .drop-slots { display: flex; gap: 10px; margin-top: 4px; }

  .slot {
    width: 56px; height: 56px;
    border-radius: 12px;
    border: 2px dashed #aaa;
    background: #f9f9f9;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; color: #333;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
  }
  .slot.filled { border-style: solid; border-color: #555; background: #fff; }
  .slot .remove-btn {
    position: absolute; top: -8px; right: -8px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #e74c3c; color: #fff; font-size: 0.65rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
  }
  .slot.consonant-slot.filled { border-color: #e06060; }
  .slot.vowel-slot.filled     { border-color: #5a9fd4; }

  .result-char {
    font-size: 3.2rem; font-weight: 700; color: #1a1a2e;
    min-height: 56px;
    display: flex; align-items: center; justify-content: center;
  }
  .hint { font-size: 0.72rem; color: #888; text-align: center; }

  .card.touch-selected { transform: scale(1.12); box-shadow: 0 0 0 3px #e74c3c; }

  #touch-ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 54px; height: 54px; border-radius: 12px;
    display: none; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; opacity: 0.85;
    transform: translate(-50%, -50%);
  }
  #touch-ghost.consonant { background: #f08080; color: #fff; }
  #touch-ghost.vowel     { background: #7eb8e8; color: #fff; }

  .btn-reset {
    margin-top: 18px; padding: 10px 28px;
    border-radius: 8px; border: none;
    background: #e0e0e0; color: #333;
    font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-reset:hover { background: #c8c8c8; }
</style>
</head>
<body>

<h1>Intro: Build a Syllable</h1>
<p class="subtitle">Drag (or tap) one consonant + one vowel into the box 👇</p>

<div id="touch-ghost"></div>

<div class="top-row">
  <!-- Left consonants -->
  <div style="background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div class="panel-title">Consonants</div>
    <div class="panel-sub">Drag one to the box</div>
    <div id="consonantLeft" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
  </div>

  <!-- Syllable box -->
  <div class="drop-panel" id="dropPanel">
    <div class="panel-title">Build a syllable</div>
    <p class="hint">Drop consonant + vowel</p>
    <div class="drop-slots">
      <div class="slot consonant-slot" id="consonantSlot">
        <span class="placeholder" style="color:#bbb;font-size:0.7rem;text-align:center;line-height:1.3;">자음<br>Con.</span>
      </div>
      <div class="slot vowel-slot" id="vowelSlot">
        <span class="placeholder" style="color:#bbb;font-size:0.7rem;text-align:center;line-height:1.3;">모음<br>Vow.</span>
      </div>
    </div>
    <div class="result-char" id="resultChar">–</div>
  </div>

  <!-- Right consonants -->
  <div style="background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div class="panel-title">Consonants</div>
    <div class="panel-sub">Drag one to the box</div>
    <div id="consonantRight" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
  </div>
</div>

<!-- Vowels row -->
<div class="vowel-row">
  <div style="background:#fff;border-radius:16px;padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);display:inline-flex;flex-direction:column;align-items:center;gap:8px;">
    <div class="panel-title">Vowels</div>
    <div class="panel-sub">Drag one to the box</div>
    <div class="vowel-grid" id="vowelGrid"></div>
  </div>
</div>

<button class="btn-reset" onclick="resetSlots()">🔄 Reset</button>

<script>
let koVoice = null;
function pickKoreanVoice() {
  const voices = speechSynthesis.getVoices();
  koVoice = voices.find(v => v.lang === 'ko-KR') || voices.find(v => v.lang && v.lang.startsWith('ko')) || null;
}
if ('speechSynthesis' in window) { pickKoreanVoice(); speechSynthesis.onvoiceschanged = pickKoreanVoice; }
function speakKorean(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  if (koVoice) utter.voice = koVoice;
  utter.rate = 0.85;
  speechSynthesis.speak(utter);
}

let audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, duration, type='sine', delay=0, vol=0.2) {
  const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + duration);
}
function playPopSound() { playTone(440, 0.08, 'square', 0, 0.08); }
function playCompleteSound() { playTone(523.25,0.12,'sine',0); playTone(659.25,0.12,'sine',0.1); playTone(783.99,0.18,'sine',0.2); }

const consonantsLeft  = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ'];
const consonantsRight = ['ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const vowels = ['ㅏ','ㅓ','ㅗ','ㅜ','ㅡ','ㅣ'];

function compose(cho, jung) {
  const choList  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const jungList = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const ci = choList.indexOf(cho), ji = jungList.indexOf(jung);
  if (ci === -1 || ji === -1) return '?';
  return String.fromCharCode(0xAC00 + ci * 21 * 28 + ji * 28);
}

let dragData = null;

function makeCard(char, type) {
  const div = document.createElement('div');
  div.className = `card ${type}`;
  div.textContent = char;
  div.draggable = true;
  div.dataset.char = char;
  div.dataset.type = type;

  div.addEventListener('dragstart', e => { dragData = { char, type }; div.classList.add('dragging'); e.dataTransfer.effectAllowed = 'copy'; });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));
  div.addEventListener('mouseenter', () => { speakKorean(type === 'vowel' ? char : compose(char, 'ㅡ')); });

  div.addEventListener('touchstart', e => {
    e.preventDefault();
    dragData = { char, type };
    const ghost = document.getElementById('touch-ghost');
    ghost.textContent = char; ghost.className = ''; ghost.id = 'touch-ghost';
    ghost.classList.add(type); ghost.style.display = 'flex';
    const t = e.touches[0];
    ghost.style.left = t.clientX + 'px'; ghost.style.top = t.clientY + 'px';
    div.classList.add('touch-selected');
  }, { passive: false });

  div.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0], ghost = document.getElementById('touch-ghost');
    ghost.style.left = t.clientX + 'px'; ghost.style.top = t.clientY + 'px';
  }, { passive: false });

  div.addEventListener('touchend', e => {
    e.preventDefault();
    const ghost = document.getElementById('touch-ghost');
    ghost.style.display = 'none'; div.classList.remove('touch-selected');
    if (!dragData) return;
    const t = e.changedTouches[0], el = document.elementFromPoint(t.clientX, t.clientY);
    if (el?.closest('#dropPanel')) placeInSlot(dragData.char, dragData.type);
    dragData = null;
  }, { passive: false });

  return div;
}

function buildGrids() {
  const cl = document.getElementById('consonantLeft');
  const cr = document.getElementById('consonantRight');
  const vg = document.getElementById('vowelGrid');
  cl.innerHTML = ''; cr.innerHTML = ''; vg.innerHTML = '';
  consonantsLeft.forEach(c => cl.appendChild(makeCard(c, 'consonant')));
  consonantsRight.forEach(c => cr.appendChild(makeCard(c, 'consonant')));
  vowels.forEach(v => vg.appendChild(makeCard(v, 'vowel')));
}

const dropPanel = document.getElementById('dropPanel');
dropPanel.addEventListener('dragover', e => { e.preventDefault(); dropPanel.classList.add('dragover'); });
dropPanel.addEventListener('dragleave', () => dropPanel.classList.remove('dragover'));
dropPanel.addEventListener('drop', e => { e.preventDefault(); dropPanel.classList.remove('dragover'); if (!dragData) return; placeInSlot(dragData.char, dragData.type); dragData = null; });

let slotData = { consonant: null, vowel: null };

function placeInSlot(char, type) {
  if (type === 'consonant') { slotData.consonant = char; renderSlot('consonantSlot', char, 'consonant'); }
  else { slotData.vowel = char; renderSlot('vowelSlot', char, 'vowel'); }
  playPopSound();
  updateResult();
}

function renderSlot(slotId, char, type) {
  const slot = document.getElementById(slotId);
  slot.innerHTML = ''; slot.classList.add('filled'); slot.textContent = char;
  const btn = document.createElement('button');
  btn.className = 'remove-btn'; btn.textContent = '✕'; btn.onclick = () => clearSlot(type);
  slot.appendChild(btn);
}

function clearSlot(type) {
  slotData[type] = null;
  const slotId = type === 'consonant' ? 'consonantSlot' : 'vowelSlot';
  const slot = document.getElementById(slotId);
  slot.innerHTML = `<span class="placeholder" style="color:#bbb;font-size:0.7rem;text-align:center;line-height:1.3;">${type === 'consonant' ? '자음<br>Con.' : '모음<br>Vow.'}</span>`;
  slot.classList.remove('filled');
  updateResult();
}

function updateResult() {
  const el = document.getElementById('resultChar');
  if (slotData.consonant && slotData.vowel) {
    const result = compose(slotData.consonant, slotData.vowel);
    el.textContent = result; playCompleteSound();
    setTimeout(() => speakKorean(result), 250);
  } else { el.textContent = '–'; }
}

function resetSlots() { slotData = { consonant: null, vowel: null }; clearSlot('consonant'); clearSlot('vowel'); }

buildGrids();
</script>
</body>
</html>
